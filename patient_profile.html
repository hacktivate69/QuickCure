<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickCare – Patient Profile</title>
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="patient.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">
      <img src="QuickCureLogo.jpg" alt="QuickCare Medical Logo - Stethoscope icon with blue background" onerror="this.style.display='none'" />
      <span>QuickCare</span>
    </div>
    <nav class="nav-links">
      <a href="indexPatient.html">Home</a>
      <a class="Home" href="patient.html">Take Appointment</a>
      <a href="index.html" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <main class="profile-container">
    <div class="profile-header">
      <h1>Your Profile</h1>
      <p>Manage your personal information and appointments.</p>
    </div>

    <section class="profile-details">
      <h2>Personal Information</h2>
      <div>
        <label for="editProfileName">Full Name:</label>
        <div class="editable-field">
          <input type="text" id="editProfileName" readonly style="border: none; background: transparent; font-weight: bold; color: #2c3e50;"/>
          <button id="editProfileBtn" class="edit-btn">Edit</button>
          <button id="saveProfileBtn" class="save-btn" style="display:none;">Save</button>
        </div>
      </div>
      <div>
        <label>Email Address:</label>
        <p id="profileEmail" style="background-color: #f0f0f0; padding: 12px 15px; border-radius: 8px; border: 1px solid #e1e8ed;"></p>
      </div>
    </section>

    <section class="appointments-section">
      <h2>Your Appointments</h2>
      <ul id="patientAppointmentsList" class="appointments-list">
        <!-- Patient's booked appointments will be loaded here -->
      </ul>
      <div id="emptyAppointments" class="empty-appointments" style="display:none;">
        <p>You have no upcoming appointments.</p>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2025 QuickCare. Making healthcare accessible for everyone.</p>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const currentUser   = JSON.parse(localStorage.getItem("mr_appointment_current_user"));
      const editProfileName = document.getElementById("editProfileName");
      const profileEmail = document.getElementById("profileEmail");
      const patientAppointmentsList = document.getElementById("patientAppointmentsList");
      const emptyAppointments = document.getElementById("emptyAppointments");
      const logoutBtn = document.getElementById("logoutBtn");
      const editProfileBtn = document.getElementById("editProfileBtn");
      const saveProfileBtn = document.getElementById("saveProfileBtn");

      // Save updated user info to localStorage
      function saveUser (updatedUser ) {
        let allUsers = JSON.parse(localStorage.getItem("mr_appointment_users") || "[]");
        const userIndex = allUsers.findIndex(u => u.email === updatedUser .email);
        if (userIndex !== -1) {
          allUsers[userIndex] = updatedUser ;
        } else {
          allUsers.push(updatedUser ); // Should not happen for existing users
        }
        localStorage.setItem("mr_appointment_users", JSON.stringify(allUsers));
        localStorage.setItem("mr_appointment_current_user", JSON.stringify(updatedUser ));
      }

      // Load patient appointments from localStorage keyed by patient email
      function loadPatientAppointments() {
        if (!currentUser  || !currentUser .email) return [];
        const key = `patient_appointments_${currentUser .email}`;
        return JSON.parse(localStorage.getItem(key) || "[]");
      }

      // Render appointments list
      function renderAppointments() {
        const appointments = loadPatientAppointments();
        patientAppointmentsList.innerHTML = "";

        if (appointments.length > 0) {
          appointments.forEach(appt => {
            const li = document.createElement("li");
            li.innerHTML = `
              <strong>${appt.doctorName}</strong> (${capitalize(appt.specialty)}) at ${appt.hospitalName}<br>
              <span>Date/Time: ${appt.time}</span><br>
              <span>Consultation Fee: ₹${appt.fee}</span>
            `;
            patientAppointmentsList.appendChild(li);
          });
          emptyAppointments.style.display = "none";
        } else {
          emptyAppointments.style.display = "block";
        }
      }

      // Capitalize helper
      function capitalize(str) {
        if (!str) return "";
        return str.charAt(0).toUpperCase() + str.slice(1);
      }

      if (currentUser  && currentUser .role === "patient") {
        editProfileName.value = currentUser .name;
        profileEmail.textContent = currentUser .email;
        renderAppointments();
      } else {
        alert("Please sign in as a patient to view this page.");
        window.location.href = "signin.html";
      }

      // Edit Profile Name functionality
      editProfileBtn.addEventListener("click", () => {
        editProfileName.readOnly = false;
        editProfileName.style.border = "2px solid #e1e8ed";
        editProfileName.style.background = "#fff";
        editProfileName.focus();
        editProfileBtn.style.display = "none";
        saveProfileBtn.style.display = "inline-block";
      });

      saveProfileBtn.addEventListener("click", () => {
        const newName = editProfileName.value.trim();
        if (newName && currentUser ) {
          const updatedUser  = { ...currentUser , name: newName };
          saveUser (updatedUser );
          alert("Profile name updated successfully!");
          editProfileName.readOnly = true;
          editProfileName.style.border = "none";
          editProfileName.style.background = "transparent";
          editProfileBtn.style.display = "inline-block";
          saveProfileBtn.style.display = "none";
        } else {
          alert("Name cannot be empty.");
        }
      });

      // Logout functionality
      if (logoutBtn) {
        logoutBtn.addEventListener("click", (e) => {
          e.preventDefault();
          localStorage.removeItem("mr_appointment_current_user");
          window.location.href = "index.html";
        });
      }

      // Listen for storage changes to update appointments dynamically (if changed in another tab)
      window.addEventListener("storage", (event) => {
        if (event.key === `patient_appointments_${currentUser .email}`) {
          renderAppointments();
        }
      });
    });
  </script>
</body>
</html>
